name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Build
      run: |
        cd MiddleScroller
        xcodebuild -scheme MiddleScroller \
          -configuration Release \
          -derivedDataPath build \
          -destination 'platform=macOS' \
          build

    - name: Run Tests
      run: |
        cd MiddleScroller
        xcodebuild -scheme MiddleScroller \
          -destination 'platform=macOS' \
          test

    - name: Install create-dmg
      if: github.event_name == 'release'
      run: brew install create-dmg

    - name: Create DMG
      if: github.event_name == 'release'
      run: |
        cd MiddleScroller

        # Generate DMG background image
        swift Resources/generate_dmg_background.swift Resources/dmg-background.png

        create-dmg \
          --volname "MiddleScroller" \
          --volicon "AppIcon.icns" \
          --background "Resources/dmg-background.png" \
          --window-pos 200 120 \
          --window-size 660 480 \
          --icon-size 128 \
          --icon "MiddleScroller.app" 180 240 \
          --hide-extension "MiddleScroller.app" \
          --app-drop-link 480 240 \
          --no-internet-enable \
          "MiddleScroller.dmg" \
          "build/Build/Products/Release/MiddleScroller.app"

        ls -la MiddleScroller.dmg

    - name: Upload DMG to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: MiddleScroller/MiddleScroller.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Build Artifact
      if: github.event_name != 'release'
      uses: actions/upload-artifact@v4
      with:
        name: MiddleScroller-app
        path: MiddleScroller/build/Build/Products/Release/MiddleScroller.app
        retention-days: 7
